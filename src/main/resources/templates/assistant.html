<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Trợ lý</title>
        <link rel="stylesheet" th:href="@{/css/all.css}">
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </head>

    <body>
        <div class="header">
            <div class="logo">SANKYUU
                <p class="name">Trợ lý</p>
            </div>

            <div class="header-actions">

                <div class="notification-container">
                    <button type="button" class="btn-icon" id="btnNoti"
                        style="position: relative;">
                        <i class="fa-solid fa-bell"></i>
                        <span class="badge" th:if="${unreadCount > 0}"
                            th:text="${unreadCount}">0</span>
                    </button>

                    <div class="notification-dropdown">
                        <div class="dropdown-header">Thông báo mới</div>
                        <div th:each="note : ${myNotifications}"
                            class="notification-item"
                            th:classappend="${!note.isRead} ? 'unread' : ''">
                            <a th:href="@{'/notification/read/' + ${note.id}}"
                                th:text="${note.content}"></a>
                            <span class="time"
                                th:text="${#temporals.format(note.createdAt, 'HH:mm dd/MM')}"></span>
                        </div>
                        <div th:if="${#lists.isEmpty(myNotifications)}"
                            class="no-notify">Không có thông báo</div>
                    </div>
                </div>

                <a th:href="@{/login/logout}">
                    <button type="button" class="btn-icon" aria-label="Logout">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    </button>
                </a>
            </div>
        </div>

        <ul class="topnav">
            <li>
                <button type="button" class="btn-icon"
                    onclick="openTab('tab-home')">
                    <i class="fa-solid fa-house"></i>
                </button>
            </li>
            <li>
                <button type="button" class="btn-icon"
                    onclick="openTab('tab-project')">
                    <i class="fa-solid fa-folder-open"></i>
                </button>
            </li>
            <li>
                <button type="button" class="btn-icon"
                    onclick="openTab('tab-assistant')">
                    <i class="fa-solid fa-user"></i>
                </button>
            </li>
            <li>
                <button type="button" class="btn-icon"
                    onclick="openTab('tab-other')">
                    <i class="fa-solid fa-hashtag"></i>
                </button>
            </li>
        </ul>

        <div class="flex-container">

            <div id="tab-home" class="tab-pane active">
                <h2>Trang chủ</h2>
                <button type="button">Công việc được giao</button>
            </div>

            <div id="tab-project" class="tab-pane">
                <h2>Tác phẩm</h2>
                <button type="button">Công việc được giao</button>

                <div class="modal fade" id="proposalModal" tabindex="-1"
                    aria-hidden="true">
                </div>
            </div>

            <div id="tab-assistant" class="tab-pane">
                <h2>Tác giả đang hỗ trợ</h2>
                <p>Tính năng đang phát triển...</p>
            </div>

            <div id="tab-other" class="tab-pane">
                <h2>Cài đặt khác</h2>
                <p>Tính năng đang phát triển...</p>
            </div>

        </div>

        <script>
        /**
         * Hàm điều phối việc chuyển đổi giữa các Tab.
         * @param {string} tabId - Chuỗi ID của thẻ div chứa nội dung cần hiển thị.
         */
        function openTab(tabId) {
            var tabPanes = document.getElementsByClassName("tab-pane");
            
            for (var i = 0; i < tabPanes.length; i++) {
                tabPanes[i].classList.remove("active");
            }
            
            document.getElementById(tabId).classList.add("active");
        }
        </script>

    </body>

</html>
