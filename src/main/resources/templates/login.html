<!doctype html>
<html lang="vi" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Đăng nhập hệ thống Manga</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="../static/css/all.css"
      th:href="@{/css/all.css}"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body class="login-page no-sidebar">
    <div class="header">
      <div class="logo">
        <span class="brand-word">SANKYUU</span>
      </div>
    </div>

    <div class="main-background">
      <div class="login-hero-copy">
        <h1 class="main-title">SANKYUU</h1>
        <h2 class="sub-title">Hệ thống vẽ truyện tranh</h2>
      </div>

      <form class="login-form" th:action="@{/login}" method="POST">
        <h1 class="form-group">ĐĂNG NHẬP HỆ THỐNG</h1>

        <div class="form-group">
          <label for="username">Tài khoản:</label>
          <input type="text" id="username" name="txtUsername" required />
        </div>

        <div th:if="${param.error != null or error != null}" class="errorlogin">
          <span>Sai thông tin đăng nhập</span>
        </div>

        <div class="form-group">
          <label for="password">Mật khẩu:</label>
          <input type="password" id="password" name="txtPassword" required />
        </div>

        <button type="submit">Đăng nhập</button>
      </form>
    </div>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script src="/js/ui-alert.js" th:src="@{/js/ui-alert.js}"></script>
    \n\n
  </body>
</html>
