    <!DOCTYPE html>
    <html lang="vi" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Đăng nhập hệ thống Manga</title>
        <link rel="stylesheet" th:href="@{/css/login.css}">
    </head>
    <body>

        <div class="header">
            <div class="logo">SANKYUU</div>
            <a href="#" class="login-link">Đăng nhập</a>
        </div>

        <div class="main-background">
            <h1 class="main-title">Hệ thống vẽ và quản lý tiến độ truyện tranh</h1>
            <p class="sub-title">Mỗi ngày còn sống là một ngày vui</p>
            
            <form class="login-form" th:action="@{/manga/login}" method="POST">
                <div class="form-group">
                    <label for="username">Tài khoản:</label>
                    <input type="text" id="username" name="txtUsername" required>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu:</label>
                    <input type="password" id="password" name="txtPassword" required>
                </div>
                <button type="submit">Đăng nhập</button>
            </form>
        </div>

    </body>
    </html>
