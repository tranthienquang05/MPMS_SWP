<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bảng Xếp Hạng</title>
    <link rel="stylesheet" th:href="@{/css/all.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
</head>
<body>

    <div class="header">
        <div class="logo">SANKYUU
            <p class="name">Bảng Xếp Hạng</p>
        </div>
        <a th:href="@{/login/logout}">
            <button type="button" class="btn-icon" aria-label="Logout">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
            </button>
        </a>
    </div>

    <div class="ranking-container">

        <!-- Nút quay lại -->
        <a href="javascript:history.back()" class="btn-back">
            <i class="fa-solid fa-arrow-left"></i> Quay lại
        </a>

        <h2>🏆 Bảng Xếp Hạng Series</h2>

        <!-- Bộ lọc tháng/năm -->
        <form th:action="@{/manga/ranking}" method="get" class="filter-row">
            <label>Tháng:
                <select name="month">
                    <option value="0" th:selected="${selectedMonth == 0}">-- Cả năm --</option>
                    <option th:each="m : ${#numbers.sequence(1, 12)}"
                            th:value="${m}"
                            th:text="'Tháng ' + ${m}"
                            th:selected="${m == selectedMonth}">
                    </option>
                </select>
            </label>
            <label>Năm:
                <select name="year">
                    <option value="2026" th:selected="${selectedYear == 2026}">2026</option>
                    <option value="2025" th:selected="${selectedYear == 2025}">2025</option>
                </select>
            </label>
            <button type="submit" class="btn-filter">Xem ranking</button>
        </form>

        <!-- Bảng xếp hạng -->
        <table th:if="${not #lists.isEmpty(rankings)}">
            <thead>
                <tr>
                    <th style="width:80px">Hạng</th>
                    <th style="width:110px">Mã Series</th>
                    <th>Tên Series</th>
                    <th style="width:130px">Tổng Phiếu</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${rankings}">
                    <td>
                        <span th:if="${item.rank == 1}" class="rank-1">🥇 1</span>
                        <span th:if="${item.rank == 2}" class="rank-2">🥈 2</span>
                        <span th:if="${item.rank == 3}" class="rank-3">🥉 3</span>
                        <span th:if="${item.rank > 3}"  th:text="${item.rank}"></span>
                    </td>
                    <td th:text="${item.seriesId}"></td>
                    <td style="text-align:left" th:text="${item.seriesName}"></td>
                    <td th:text="${item.totalVotes}"></td>
                </tr>
            </tbody>
        </table>

        <p class="empty-msg" th:if="${#lists.isEmpty(rankings)}">
            Không có dữ liệu cho kỳ này.
        </p>

    </div>

</body>
</html>
