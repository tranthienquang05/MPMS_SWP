<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Tác giả</title>
        <link rel="stylesheet" th:href="@{/css/all.css}">
    </head>

    <body>
        <div class="header">
            <div class="logo">SANKYUU</div>
            <a th:href="@{/manga/logout}"><button type="submit">Logout</button></a>
        </div>

        <h1>Chào mừng Tác giả</h1>
        <p>Đây là khu vực làm việc của Mangaka</p>

        /* ui */
        <ul class="topnav">
            <li><a href="#">Home</a></li>
            <li><a href="#">News</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="#">About</a></li>
        </ul>

        /* Content */
        <div class="flex-container">
            <div class="alert alert-success mt-2" th:if="${message}"
                th:text="${message}"></div>
            <div class="alert alert-danger mt-2" th:if="${error}"
                th:text="${error}"></div>

            <h2>Trang chủ</h2>
            <button type="submit">Trang chủ</button>
            <button type="submit">Xem ranking</button>

            <h2>Tác phẩm</h2>
            <button type="submit">Thư viện tác phẩm</button>
            <button type="submit">➕ Tạo tác phẩm mới (Nộp dự án)</button>


            <div class="modal fade" id="proposalModal" tabindex="-1" aria-labelledby="proposalModalLabel" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" id="proposalModalLabel">Đăng Ký Đề Xuất Dự Án Mới</h5>
                            <button type="button" class="btn-close"
                                data-bs-shadow="modal" data-bs-dismiss="modal"
                                aria-label="Close"></button>
                        </div>
                        <form th:action="@{/manga/mangaka/submit-proposal}"
                            method="POST" enctype="multipart/form-data">
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Tên dự án
                                        (Series Name):</label>
                                    <input type="text" name="txtSeriesName"
                                        class="form-control" maxlength="30"
                                        required
                                        placeholder="Nhập tên bộ truyện...">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Tệp bản
                                        thảo
                                        đính kèm (PDF/ZIP):</label>
                                    <input type="file" name="fileManuscript"
                                        class="form-control"
                                        accept=".pdf,.zip,.rar"
                                        required>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="submit">Đóng</button>
                                <button type="submit">Submit</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
