<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Đăng nhập hệ thống Manga</title>
        <link rel="stylesheet" th:href="@{/css/all.css}">
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </head>

    <body>
        <div class="header">
            <div class="logo">SANKYUU
                <p class="name">Tác giả truyện tranh</p>
            </div>

            <a th:href="@{/manga/logout}">
                <button type="button" class="btn-icon" aria-label="Logout">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                </button>
            </a>
        </div>

        <ul class="topnav">
            <li>
                <button type="button" class="btn-icon" onclick="openTab('tab-home')">
                    <i class="fa-solid fa-house"></i>
                </button>
            </li>
            <li>
                <button type="button" class="btn-icon" onclick="openTab('tab-project')">
                    <i class="fa-solid fa-folder-open"></i>
                </button>
            </li>
            <li>
                <button type="button" class="btn-icon" onclick="openTab('tab-assistant')">
                    <i class="fa-solid fa-user"></i>
                </button>
            </li>
            <li>
                <button type="button" class="btn-icon" onclick="openTab('tab-other')">
                    <i class="fa-solid fa-hashtag"></i>
                </button>
            </li>
        </ul>

        <div class="flex-container">

            <div id="tab-home" class="tab-pane active">
                <h2>Trang chủ</h2>
                <button type="button">Xem ranking</button>
            </div>

            <div id="tab-project" class="tab-pane">
                <h2>Tác phẩm</h2>
                <button type="button">Thư viện tác phẩm</button>
                <div class="modal fade" id="proposalModal" tabindex="-1" aria-labelledby="proposalModalLabel" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" id="proposalModalLabel">Đăng Ký Đề Xuất Dự Án Mới</h5>
                            <button type="button" class="btn-close" data-bs-shadow="modal" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <form th:action="@{/manga/mangaka/submit-proposal}" method="POST" enctype="multipart/form-data">
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Tên dự án (Series Name):</label>
                                    <input type="text" name="txtSeriesName" class="form-control" maxlength="30" required placeholder="Nhập tên bộ truyện...">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Tệp bản thảo đính kèm (PDF/ZIP):</label>
                                    <input type="file" name="fileManuscript" class="form-control"accept=".pdf,.zip,.rar" required>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="submit">Đóng</button>
                                <button type="submit">Submit</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

                <div class="modal fade" id="proposalModal" tabindex="-1" aria-hidden="true">
                </div>
            </div>

            <div id="tab-assistant" class="tab-pane">
                <h2>Quản lý Trợ lý</h2>
                <p>Tính năng đang phát triển...</p>
            </div>

            <div id="tab-other" class="tab-pane">
                <h2>Cài đặt khác</h2>
                <p>Tính năng đang phát triển...</p>
            </div>

        </div>
        <script>
        /**
         * Hàm điều phối việc chuyển đổi giữa các Tab.
         * @param {string} tabId - Chuỗi ID của thẻ div chứa nội dung cần hiển thị.
         */
        function openTab(tabId) {
            var tabPanes = document.getElementsByClassName("tab-pane");
            
            for (var i = 0; i < tabPanes.length; i++) {
                tabPanes[i].classList.remove("active");
            }
            
            document.getElementById(tabId).classList.add("active");
        }
    </script>
    </body>
</html>
