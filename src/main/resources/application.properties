spring.application.name=manga-management
spring.config.import=optional:file:.env.properties

# Gemini
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=gemini-3.5-flash

# OpenAI - Image generation
openai.api.key=${OPENAI_API_KEY:}
openai.image.model=gpt-image-2

# Database
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/swp391?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Use exact column names from @Column(name=...) without snake_case conversion
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# OpenAPI / Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=proakm78@gmail.com
spring.mail.password=cfdfjcgrojcejulm
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# eSMS - OTP qua đầu số cố định (SmsType=8)
app.sms.provider=${SMS_PROVIDER:esms}
app.sms.esms.endpoint=${ESMS_ENDPOINT:https://rest.esms.vn/MainService.svc/json/SendMultipleMessage_V4_post_json/}
app.sms.esms.api-key=${ESMS_API_KEY:}
app.sms.esms.secret-key=${ESMS_SECRET_KEY:}
app.sms.esms.sms-type=${ESMS_SMS_TYPE:8}
app.sms.esms.sandbox=${ESMS_SANDBOX:true}
app.sms.esms.template-ready=${ESMS_TEMPLATE_READY:false}
app.sms.otp-template=${SMS_OTP_TEMPLATE:SANKYUU - Ma OTP cua ban la {OTP}. Ma co hieu luc trong 5 phut.}

# Runtime uploads must live outside the packaged classpath so they remain
# available after restart and when the application runs from a JAR.
app.upload.root=${APP_UPLOAD_ROOT:uploads}
