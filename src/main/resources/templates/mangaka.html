<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Không gian làm việc (Mangaka)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        button { margin: 4px; }
    </style>
</head>
<body class="container p-4">
    <h1>Chào mừng Tác giả</h1>
    <p>Đây là khu vực làm việc của Mangaka</p>

    <div class="alert alert-success mt-2" th:if="${message}" th:text="${message}"></div>
    <div class="alert alert-danger mt-2" th:if="${error}" th:text="${error}"></div>

    <h2>Trang chủ</h2>
    <button type="button" class="btn btn-outline-secondary">Trang chủ</button>
    <button type="button" class="btn btn-outline-secondary">Xem ranking</button>

    <h2>Tác phẩm</h2>
    <button type="button" class="btn btn-outline-secondary">Thư viện tác phẩm</button> 
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#proposalModal">
        ➕ Tạo tác phẩm mới (Nộp dự án)
    </button>

    <br><br>
    <a th:href="@{/manga/logout}" class="btn btn-secondary">Đăng xuất</a>

    <div class="modal fade" id="proposalModal" tabindex="-1" aria-labelledby="proposalModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="proposalModalLabel">Đăng Ký Đề Xuất Dự Án Mới</h5>
                    <button type="button" class="btn-close" data-bs-shadow="modal" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action="@{/manga/mangaka/submit-proposal}" method="POST" enctype="multipart/form-data">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên dự án (Series Name):</label>
                            <input type="text" name="txtSeriesName" class="form-control" maxlength="30" required placeholder="Nhập tên bộ truyện...">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Tệp bản thảo đính kèm (PDF/ZIP):</label>
                            <input type="file" name="fileManuscript" class="form-control" accept=".pdf,.zip,.rar" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                        <button type="submit" class="btn btn-success">Submit (Gửi nộp)</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
