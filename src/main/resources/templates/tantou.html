<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Tantou Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/all.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Debug CSS để biết bảng có thực sự tồn tại hay không */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .data-table th,
        .data-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo">SANKYUU</div>
        <a th:href="@{/login/logout}"><button type="button">Logout</button></a>
    </div>

    <h1>Chào mừng Tantou</h1>

    <ul class="topnav">
        <li><button type="button" class="btn-icon" onclick="openTab('tab-home')"><i
                    class="fa-solid fa-house"></i></button></li>
        <li><button type="button" class="btn-icon" onclick="openTab('tab-project')"><i
                    class="fa-solid fa-folder-open"></i></button></li>
    </ul>

    <div class="flex-container">
        <div id="tab-project" class="tab-pane active">
            <h2>Tác phẩm</h2>

            <div id="sub-tab-new" class="sub-tab-pane">
                <p th:text="'Tổng số bản thảo: ' + (${listProposals != null} ? ${listProposals.size()} : 0)"></p>

                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Mã Đề Xuất</th>
                            <th>Tên Series</th>
                            <th>Trạng Thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <p th:text="${#lists.size(listProposals)}"></p>
                        <tr th:if="${listProposals == null or listProposals.isEmpty()}">
                            <td colspan="4" style="text-align: center;">Không có dữ liệu bản thảo.</td>
                        </tr>

                        <tr th:each="p : ${listProposals}">
                            <td th:text="${p.id}">ID</td>
                            <td th:text="${p.seriesName}">Series Name</td>
                            <td th:text="${p.status}">Status</td>
                            <td>
                                <form th:action="@{/manga/tantou/review}" method="POST">
                                    <input type="hidden" name="id" th:value="${p.id}">
                                    <button type="submit" name="action" value="yes">Duyệt</button>
                                    <button type="submit" name="action" value="no">Từ chối</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function openTab(tabId) {
            document.querySelectorAll(".tab-pane").forEach(p => p.classList.remove("active"));
            document.getElementById(tabId).classList.add("active");
        }
    </script>
</body>

</html>
