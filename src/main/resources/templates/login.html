<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manga System Login</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 320px; }
        h2 { text-align: center; color: #333; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #3498db; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #2980b9; }
        .error { color: #e74c3c; text-align: center; margin-bottom: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>MPMS LOGIN</h2>
    
    <div th:if="${error}" class="error" th:text="${error}"></div>

    <form action="/manga/login" method="POST">
        <div class="input-group">
            <label>Tên đăng nhập (Username)</label>
            <input type="text" name="username" placeholder="Nhập: mangaka, assistant, editor..." required>
        </div>
        <div class="input-group">
            <label>Mật khẩu (Password)</label>
            <input type="password" name="password" placeholder="Nhập bất kỳ..." required>
        </div>
        <button type="submit">Đăng Nhập System</button>
    </form>
</div>

</body>
</html>
