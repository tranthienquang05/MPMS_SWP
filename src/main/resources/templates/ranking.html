<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bảng Xếp Hạng</title>
    <link rel="stylesheet" th:href="@{/css/all.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .ranking-container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .filter-row { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
        select { padding: 7px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        .btn-filter { padding: 8px 20px; background: #4a90d9; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .btn-filter:hover { background: #3a7bc8; }
        .btn-back { padding: 8px 16px; background: #888; color: white; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; display: inline-block; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #4a90d9; color: white; padding: 12px; text-align: center; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        tr:nth-child(even) td { background: #f9f9f9; }
        .rank-1 { color: #f5a623; font-weight: bold; }
        .rank-2 { color: #9b9b9b; font-weight: bold; }
        .rank-3 { color: #cd7f32; font-weight: bold; }
        .empty-msg { text-align: center; color: #999; padding: 30px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">SANKYUU
            <p class="name">Bảng Xếp Hạng</p>
        </div>
        <a th:href="@{/manga/logout}">
            <button type="button" class="btn-icon" aria-label="Logout">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
            </button>
        </a>
    </div>

    <div class="ranking-container">

        <!-- Nút quay lại -->
        <a href="javascript:history.back()" class="btn-back">
            <i class="fa-solid fa-arrow-left"></i> Quay lại
        </a>

        <h2>🏆 Bảng Xếp Hạng Series</h2>

        <!-- Bộ lọc tháng/năm -->
        <form th:action="@{/manga/ranking}" method="get" class="filter-row">
            <label>Tháng:
                <select name="month">
                    <option value="0" th:selected="${selectedMonth == 0}">-- Cả năm --</option>
                    <option th:each="m : ${#numbers.sequence(1, 12)}"
                            th:value="${m}"
                            th:text="'Tháng ' + ${m}"
                            th:selected="${m == selectedMonth}">
                    </option>
                </select>
            </label>
            <label>Năm:
                <select name="year">
                    <option value="2026" th:selected="${selectedYear == 2026}">2026</option>
                    <option value="2025" th:selected="${selectedYear == 2025}">2025</option>
                </select>
            </label>
            <button type="submit" class="btn-filter">Xem ranking</button>
        </form>

        <!-- Bảng xếp hạng -->
        <table th:if="${not #lists.isEmpty(rankings)}">
            <thead>
                <tr>
                    <th style="width:80px">Hạng</th>
                    <th style="width:110px">Mã Series</th>
                    <th>Tên Series</th>
                    <th style="width:130px">Tổng Phiếu</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${rankings}">
                    <td>
                        <span th:if="${item.rank == 1}" class="rank-1">🥇 1</span>
                        <span th:if="${item.rank == 2}" class="rank-2">🥈 2</span>
                        <span th:if="${item.rank == 3}" class="rank-3">🥉 3</span>
                        <span th:if="${item.rank > 3}"  th:text="${item.rank}"></span>
                    </td>
                    <td th:text="${item.seriesId}"></td>
                    <td style="text-align:left" th:text="${item.seriesName}"></td>
                    <td th:text="${item.totalVotes}"></td>
                </tr>
            </tbody>
        </table>

        <p class="empty-msg" th:if="${#lists.isEmpty(rankings)}">
            Không có dữ liệu cho kỳ này.
        </p>

    </div>

</body>
</html>
