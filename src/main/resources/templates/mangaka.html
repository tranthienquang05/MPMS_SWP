<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Mangaka</title>
    <link rel="stylesheet" th:href="@{/css/all.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="header">
        <div class="logo">SANKYUU
            <p class="name">Tác giả truyện tranh</p>
        </div>

        <div class="header-actions">

            <a th:href="@{/login/logout}">
                <button type="button" class="btn-icon" aria-label="Logout">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                </button>
            </a>
        </div>
    </div>

    <ul class="topnav">
        <li>
            <button type="button" class="btn-icon" onclick="openTab('tab-home')">
                <i class="fa-solid fa-house"></i>
            </button>
        </li>
        <li>
            <button type="button" class="btn-icon" onclick="openTab('tab-project')">
                <i class="fa-solid fa-folder-open"></i>
            </button>
        </li>
        <li>
            <button type="button" class="btn-icon" onclick="openTab('tab-assistant')">
                <i class="fa-solid fa-user"></i>
            </button>
        </li>
        <li>
            <button type="button" class="btn-icon" onclick="openTab('tab-other')">
                <i class="fa-solid fa-hashtag"></i>
            </button>
        </li>
    </ul>

    <div class="flex-container">

        <div id="tab-home" class="tab-pane" th:classappend="${message == null } ? 'active' : ''">
            <h2>Trang chủ</h2>
            <button type="button">Xem ranking</button>
        </div>

        <div id="tab-project" class="tab-pane" th:classappend="${message != null} ? 'active' : ''">
            <h2>Tác phẩm</h2>
            <button type="button">Thư viện tác phẩm</button>

            <button id="btnOpenModal">Mở form nộp bản thảo</button>

            <div id="proposalModalOverlay" class="modal-overlay">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="proposalModalLabel">Đăng
                            Ký Đề Xuất Dự Án Mới</h5>
                        <button type="button" class="btn-close" id="btnCloseTop">X</button>
                    </div>
                    <form th:action="@{/manga/mangaka/submit-proposal}" method="POST" enctype="multipart/form-data">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Tên dự án
                                    (Series Name):</label>
                                <input type="text" name="txtSeriesName" class="form-control" maxlength="30" required
                                    placeholder="Nhập tên bộ truyện...">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Tệp bản
                                    thảo đính kèm (PDF/ZIP):</label>
                                <input type="file" name="fileManuscript" class="form-control" accept=".pdf,.zip,.rar"
                                    required>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" id="btnCancel">Hủy</button>
                            <button type="submit">Submit</button>
                        </div>
                    </form>
                </div>
            </div>

            <div id="notificationModalOverlay" class="modal-overlay" th:if="${message != null}" style="display: flex;">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Thông báo hệ thống</h5>
                        <button type="button" class="btn-close" id="btnCloseNotification">X</button>
                    </div>
                    <div class="modal-body">
                        <p style="text-align: center; font-weight: bold; font-size: 16px;" th:text="${message ?: error}"
                            th:styleappend="${message != null} ? 'color: #28a745;' : 'color: #dc3545;'">
                        </p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" id="btnOkNotification" class="btn-action approve"
                            style="padding: 8px 20px;">OK</button>
                    </div>
                </div>
            </div>

            <div class="modal fade" id="proposalModal" tabindex="-1" aria-hidden="true"></div>
        </div>
        <a th:href="@{/api/ai/features}">
            <button type="button" class="btn-icon" aria-label="AI">
                <i class="fa-solid fa-brain"></i>
            </button>
        </a>
        <div id="tab-assistant" class="tab-pane">
            <h2>Quản lý Trợ lý</h2>
            <p>Tính năng đang phát triển...</p>
        </div>
        <div id="tab-other" class="tab-pane">
            <h2>Cài đặt khác</h2>
            <p>Tính năng đang phát triển...</p>
        </div>

    </div>
    <script>
        /**
         * Hàm điều phối việc chuyển đổi giữa các Tab.
         * @param {string} tabId - Chuỗi ID của thẻ div chứa nội dung cần hiển thị.
         */
        function openTab(tabId) {
            var tabPanes = document.getElementsByClassName("tab-pane");

            for (var i = 0; i < tabPanes.length; i++) {
                tabPanes[i].classList.remove("active");
            }

            document.getElementById(tabId).classList.add("active");
        }

        // Xử lý logic cho Modal (cửa sổ nổi) nộp bản thảo
        document.addEventListener("DOMContentLoaded", function () {
            // Lấy các tham chiếu đến các phần tử DOM
            const modalOverlay = document.getElementById("proposalModalOverlay");
            const btnOpen = document.getElementById("btnOpenModal");
            const btnCloseTop = document.getElementById("btnCloseTop");
            const btnCancel = document.getElementById("btnCancel");

            // Hàm thực thi việc mở cửa sổ nổi
            function openModal() {
                modalOverlay.style.display = "flex";
            }

            // Hàm thực thi việc đóng cửa sổ nổi
            function closeModal() {
                modalOverlay.style.display = "none";
            }

            // Lắng nghe sự kiện mở modal
            if (btnOpen) {
                btnOpen.addEventListener("click", openModal);
            }

            // Lắng nghe sự kiện đóng modal từ nút X và nút Hủy
            if (btnCloseTop) {
                btnCloseTop.addEventListener("click", closeModal);
            }
            if (btnCancel) {
                btnCancel.addEventListener("click", closeModal);
            }

            // Xử lý logic đóng cửa sổ khi click ra ngoài vùng nội dung
            modalOverlay.addEventListener("click", function (event) {
                // Chỉ đóng khi phần tử bị click chính xác là vùng mờ (không phải các thẻ con bên trong)
                if (event.target === modalOverlay) {
                    closeModal();
                }
            });
        });
        // Thêm đoạn mã này vào cuối hàm xử lý sự kiện DOMContentLoaded hiện có của anh
        const notificationModal = document.getElementById("notificationModalOverlay");
        const btnCloseNotification = document.getElementById("btnCloseNotification");
        const btnOkNotification = document.getElementById("btnOkNotification");

        // Hàm thực hiện ẩn cửa sổ thông báo hệ thống
        function closeNotificationModal() {
            if (notificationModal) {
                notificationModal.style.display = "none";
            }
        }

        // Đăng ký sự kiện click chuột để tắt cửa sổ nổi thông báo
        if (btnCloseNotification) {
            btnCloseNotification.addEventListener("click", closeNotificationModal);
        }
        if (btnOkNotification) {
            btnOkNotification.addEventListener("click", closeNotificationModal);
        }

        // Đóng cửa sổ thông báo nếu người dùng click ra vùng mờ bao quanh
        if (notificationModal) {
            notificationModal.addEventListener("click", function (event) {
                if (event.target === notificationModal) {
                    closeNotificationModal();
                }
            });
        }
    </script>





    <script>
        (function () {
            document.addEventListener("DOMContentLoaded", function () {
                // Tự động tìm thẻ <a> có link chứa /api/ai/features của bạn mà không cần sửa code cũ
                const aiLink = document.querySelector('a[href*="/api/ai/features"]');

                if (aiLink) {
                    aiLink.addEventListener("click", function (event) {
                        event.preventDefault(); // Ngăn việc load trang JSON thô ở tab hiện tại

                        // 1. Kích hoạt mở một tab mới tinh trên trình duyệt
                        const newTab = window.open('about:blank', '_blank');

                        // 2. Tiến hành ghi đè giao diện Workspace kiểm thử AI Support hoàn chỉnh vào tab mới
                        newTab.document.write(`
    <!DOCTYPE html>                    
    <html lang="vi">
    <head>
        <meta charset="UTF-8">
        <title>AI Support Test Workspace</title>
        <style>
            body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f6f9; color: #333; margin: 0; padding: 40px 20px; }
            .container { max-width: 1100px; margin: 0 auto; }
            .header { text-align: center; margin-bottom: 30px; }
            .header h1 { margin: 0; color: #222; font-size: 28px; }
            .workspace { display: flex; gap: 25px; flex-wrap: wrap; margin-top: 20px; }
            .panel-left { flex: 1; min-width: 320px; max-width: 450px; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e1e4e8; box-sizing: border-box; }
            .panel-right { flex: 1.5; min-width: 400px; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e1e4e8; display: flex; flex-direction: column; box-sizing: border-box; }
            h3 { margin-top: 0; margin-bottom: 20px; color: #4a5568; font-size: 18px; border-bottom: 2px solid #edf2f7; padding-bottom: 10px; }
            .form-group { margin-bottom: 18px; }
            label { display: block; margin-bottom: 7px; font-weight: 600; font-size: 14px; color: #4a5568; }
            select, textarea, input[type="file"] { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #cbd5e0; box-sizing: border-box; font-size: 14px; }
            select:focus, textarea:focus { outline: none; border-color: #3182ce; box-shadow: 0 0 0 3px rgba(66,153,225,0.5); }
            .btn-run { width: 100%; background: #28a745; color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold; font-size: 15px; cursor: pointer; transition: background 0.2s; }
            .btn-run:hover { background: #218838; }
            .btn-run:disabled { background: #a0aec0; cursor: not-allowed; }
            .preview-area { min-height: 350px; border: 2px dashed #cbd5e0; border-radius: 6px; display: flex; align-items: center; justify-content: center; background: #f8fafc; flex-grow: 1; padding: 15px; box-sizing: border-box; text-align: center; }
            .preview-area img { max-width: 100%; max-height: 450px; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
            .text-result { width: 100%; padding: 15px; background: #ebf8ff; border-left: 4px solid #3182ce; color: #2b6cb0; border-radius: 4px; text-align: left; white-space: pre-line; font-size: 14px; line-height: 1.6; box-sizing: border-box; }
            .error-result { width: 100%; padding: 15px; background: #fff5f5; border-left: 4px solid #e53e3e; color: #c53030; border-radius: 4px; text-align: left; font-size: 14px; box-sizing: border-box; }
            .req-id { font-size: 11px; font-family: monospace; color: #718096; text-align: right; margin-top: 10px; }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1>🔮 AI Manga Support Workspace (Tab Kiểm Thử)</h1>
            </div>
            
            <div class="workspace">
                <div class="panel-left">
                    <h3>Cấu hình tính năng</h3>
                    <div class="form-group">
                        <label>Chọn chức năng AI:</label>
                        <select id="featSel">
                            <option value="color">Tô màu Manga (Color)</option>
                            <option value="shadow">Đổ bóng chuyên nghiệp (Shadow)</option>
                            <option value="clean_line">Làm sạch nét vẽ (Clean Line)</option>
                            <option value="background">Vẽ hậu cảnh tự động (Background)</option>
                            <option value="lettering">Phân tích hội thoại (Lettering - Vision)</option>
                            <option value="expression">Phân tích biểu cảm (Expression - Vision)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Tải ảnh Manga lên (Mã hóa Base64):</label>
                        <input type="file" id="imgInp" accept="image/*">
                    </div>
                    <div class="form-group">
                        <label>Yêu cầu bổ sung (Prompt):</label>
                        <textarea id="promptInp" rows="4" placeholder="Ví dụ: Thêm tông màu anime rực rỡ, đổ bóng sâu..."></textarea>
                    </div>
                    <button id="runAI" class="btn-run">Chạy AI ngay</button>
                </div>

                <div class="panel-right">
                    <h3>Kết quả từ API Backend</h3>
                    <div id="resContainer" class="preview-area">
                        <span style="color: #718096;">Chọn tính năng, upload ảnh và bấm nút để kiểm tra kết nối API...</span>
                    </div>
                    <div id="reqId" class="req-id"></div>
                </div>
            </div>
        </div>

        <script>
            let base64Str = "";

            // Xử lý đọc file cục bộ chuyển đổi định dạng Base64
            document.getElementById('imgInp').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(evt) { base64Str = evt.target.result; };
                    reader.readAsDataURL(file);
                }
            });

            // Gửi dữ liệu đồng bộ đến endpoint của AISupportController
            document.getElementById('runAI').addEventListener('click', async function() {
                const feature = document.getElementById('featSel').value;
                const prompt = document.getElementById('promptInp').value;
                const resContainer = document.getElementById('resContainer');
                const reqIdBadge = document.getElementById('reqId');
                const btn = document.getElementById('runAI');

                if (!base64Str && ['lettering', 'expression'].includes(feature)) {
                    alert("Lưu ý: Tính năng phân tích hình ảnh bắt buộc phải có ảnh đầu vào!");
                    return;
                }

                btn.innerText = "Hệ thống đang xử lý...";
                btn.disabled = true;
                resContainer.innerHTML = '<div><p style="font-weight: bold; color: #3182ce; margin: 0;">⏳ Đang gọi API POST /api/ai/run...</p><p style="font-size: 12px; color: #718096; margin-top: 5px;">Vui lòng đợi OpenAI phản hồi xử lý ảnh</p></div>';
                reqIdBadge.innerText = "";

                try {
                    const res = await fetch('/api/ai/run', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ feature, prompt, imageBase64: base64Str })
                    });

                    const data = await res.json();

                    if (res.ok && data.status === 'success') {
                        if (data.requestId) reqIdBadge.innerText = "x-request-id: " + data.requestId;

                        if (['color', 'shadow', 'clean_line', 'background'].includes(feature)) {
                            const src = data.result.startsWith('data:') ? data.result : 'data:image/png;base64,' + data.result;
                            resContainer.innerHTML = '<img src="' + src + '" alt="AI Result">';
                        } else {
                            resContainer.innerHTML = '<div class="text-result"><strong>Phân tích thành công từ gpt-4o:</strong><br><br>' + data.result + '</div>';
                        }
                    } else {
                        resContainer.innerHTML = '<div class="error-result">❌ Thất bại từ Server: ' + (data.message || 'Lỗi xử lý nội bộ') + '</div>';
                    }
                } catch (err) {
                    resContainer.innerHTML = '<div class="error-result">❌ Lỗi Kết Nối: Không thể kết nối đến Controller. Đảm bảo Spring Boot đang chạy!</div>';
                } finally {
                    btn.innerText = "Chạy AI ngay";
                    btn.disabled = false;
                }
            });
        <\/script>
    </body>
    </html>
                        `);
                        newTab.document.close();
                    });
                }
            });
        })();
    </script>
</body>

</html>
