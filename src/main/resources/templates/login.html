<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Đăng nhập hệ thống Manga</title>
        <link rel="stylesheet" th:href="@{/css/all.css}">
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </head>
    <body>

        <div class="header">
            <div class="logo">SANKYUU</div>
        </div>

        <div class="main-background">
            <h1 class="main-title">Công ty truyện tranh
                <span class="indent-text">Sankyuu</span>
            </h1>
            <h2 class="sub-title">Hệ thống vẽ truyện tranh</h2>

            <form class="login-form" th:action="@{/login}" method="POST">
                <h1 class="form-group">ĐĂNG NHẬP HỆ THỐNG</h1>

                <div class="form-group">
                    <label for="username">Tài khoản:</label>
                    <input type="text" id="username" name="txtUsername"
                        required>
                </div>

                <div th:if="${param.error != null or error != null}"
                    class="errorlogin">
                    <span>Sai thông tin đăng nhập</span>
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu:</label>
                    <input type="password" id="password" name="txtPassword"
                        required>
                </div>

                <button type="submit">Đăng nhập</button>
            </form>
        </div>

    </body>

</html>
