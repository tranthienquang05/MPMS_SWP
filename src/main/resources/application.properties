spring.application.name=manga-management

# OpenAI — Image generation (gpt-image-1)
openai.api.key=
openai.api.url=https://api.openai.com/v1/images/generations
openai.image.model=gpt-image-1

# OpenAI — Vision / analysis (gpt-4o)
openai.vision.model=gpt-4o-mini
openai.vision.url=https://api.openai.com/v1/chat/completions

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/swp391?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Use exact column names from `@Column(name=...)` without applying snake_case conversion
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# MySQL Dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Tuỳ chỉnh đường dẫn swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Nếu dùng Spring Security, cho phép truy cập không cần auth
springdoc.swagger-ui.enabled=true


spring.mvc.pathmatch.matching-strategy=ant_path_matcher