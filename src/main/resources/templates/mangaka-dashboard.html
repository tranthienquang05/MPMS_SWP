<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mangaka Workspace</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
</head>
<body>
    <h1>✍ Không gian làm việc: Họa sĩ (Mangaka)</h1>
    <p>Xin chào, <strong th:text="${session.user.fullName}"></strong> | <a href="/manga/logout">Đăng xuất</a></p>
    <hr>
    
    <h3>Hành động 1: Đăng ký Series mới</h3>
    <form action="/mangaka/create-series" method="POST">
        <input type="text" name="title" placeholder="Tên bộ truyện..." required>
        <input type="text" name="description" placeholder="Mô tả..." required>
        <button type="submit">Create Series</button>
    </form>

    <h3>Hành động 2: Tạo Chapter mới (Cho truyện đã APPROVED)</h3>
    <form action="/mangaka/create-chapter" method="POST">
        <select name="seriesId" required>
            <option th:each="s : ${allSeries}" th:if="${s.status == 'APPROVED'}" th:value="${s.id}" th:text="${s.title}"></option>
        </select>
        <input type="number" name="volumeNumber" placeholder="Tập số..." required style="width: 80px;">
        <input type="text" name="title" placeholder="Tên chapter..." required>
        <button type="submit">Create Chapter</button>
    </form>

    <h3>Bảng quản lý công việc và sửa đổi Chapter</h3>
    <table>
        <thead>
            <tr>
                <th>Tên Chapter</th>
                <th>Trạng thái bản vẽ</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="ch : ${allChapters}">
                <td th:text="${ch.title}"></td>
                <td th:text="${ch.status}"></td>
                <td>
                    <form th:if="${ch.status == 'SKETCHING'}" action="/mangaka/assign-task" method="POST">
                        <input type="hidden" name="chapterId" th:value="${ch.id}">
                        <input type="text" name="description" placeholder="Giao việc đi nét..." required>
                        <button type="submit">Assigning tasks</button>
                    </form>
                    <form th:if="${ch.status == 'AMENDMENT_REQUIRED'}" th:action="@{/mangaka/fix-chapter/{id}(id=${ch.id})}" method="POST">
                        <button type="submit" style="background: #e74c3c;">Sửa xong & Gửi lại (Fix Chapter)</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
