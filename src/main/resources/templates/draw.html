<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Draw Test - AI Support</title>
    <link rel="stylesheet" th:href="@{/css/all.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ps-bg-darkest: #1e1e1e;
            --ps-bg-dark: #2b2b2b;
            --ps-bg-mid: #383838;
            --ps-bg-light: #444444;
            --ps-bg-lighter: #555555;
            --ps-border: #1a1a1a;
            --ps-text: #cfcfcf;
            --ps-text-dim: #8a8a8a;
            --ps-accent: #3d8eff;
            --ps-accent-hover: #5a9fff;
            --ps-canvas-checker-a: #4a4a4a;
        }

        .draw-wrapper * {
            box-sizing: border-box;
        }

        .draw-wrapper {
            height: calc(100vh - 60px);
            display: flex;
            background-color: var(--ps-bg-darkest);
            font-family: "Segoe UI", Arial, sans-serif;
            color: var(--ps-text);
            user-select: none;
        }

        /* =================== TOOLBAR TRÁI =================== */
        .left-toolbar {
            width: 52px;
            background-color: var(--ps-bg-dark);
            border-right: 1px solid var(--ps-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 0;
            gap: 2px;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .lt-btn {
            width: 38px;
            height: 38px;
            border: none;
            border-radius: 4px;
            background-color: transparent;
            color: var(--ps-text);
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .lt-btn:hover {
            background-color: var(--ps-bg-light);
        }

        .lt-btn.active {
            background-color: var(--ps-accent);
            color: #fff;
        }

        .lt-divider {
            width: 30px;
            height: 1px;
            background-color: var(--ps-border);
            margin: 6px 0;
            flex-shrink: 0;
        }

        .lt-swatch-wrap {
            position: relative;
            width: 38px;
            height: 38px;
            margin-top: 4px;
            flex-shrink: 0;
        }

        .lt-color-fg,
        .lt-color-bg {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 3px;
            border: 1px solid #000;
            cursor: pointer;
            padding: 0;
        }

        .lt-color-fg {
            top: 0;
            left: 0;
            z-index: 2;
        }

        .lt-color-bg {
            bottom: 0;
            right: 0;
            z-index: 1;
            background-color: #ffffff;
        }

        /* =================== TOP PROPERTY BAR =================== */
        .top-property-bar {
            min-height: 44px;
            background-color: var(--ps-bg-dark);
            border-bottom: 1px solid var(--ps-border);
            display: flex;
            align-items: center;
            padding: 6px 14px;
            gap: 16px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .prop-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .prop-label {
            font-size: 11px;
            color: var(--ps-text-dim);
            white-space: nowrap;
        }

        .prop-group input[type="range"] {
            width: 80px;
            accent-color: var(--ps-accent);
        }

        .prop-value {
            font-size: 11px;
            color: var(--ps-text);
            width: 30px;
            text-align: right;
        }

        .prop-divider {
            width: 1px;
            height: 22px;
            background-color: var(--ps-border);
        }

        .shape-fill-toggle {
            display: flex;
            gap: 4px;
        }

        .shape-fill-btn {
            font-size: 10.5px;
            padding: 4px 8px;
            border-radius: 3px;
            border: 1px solid var(--ps-bg-light);
            background-color: var(--ps-bg-mid);
            color: var(--ps-text);
            cursor: pointer;
        }

        .shape-fill-btn.active {
            background-color: var(--ps-accent);
            border-color: var(--ps-accent);
            color: #fff;
        }

        .btn-ai-support-top {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 7px;
            background-color: var(--ps-accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            flex-shrink: 0;
        }

        .btn-ai-support-top:hover {
            background-color: var(--ps-accent-hover);
        }

        /* =================== PALETTE MÀU (giống Paint) =================== */
        .color-palette-bar {
            display: flex;
            align-items: center;
            gap: 4px;
            background-color: var(--ps-bg-dark);
            border-bottom: 1px solid var(--ps-border);
            padding: 6px 14px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .palette-swatch {
            width: 18px;
            height: 18px;
            border-radius: 2px;
            border: 1px solid #000;
            cursor: pointer;
            flex-shrink: 0;
        }

        .palette-swatch:hover {
            outline: 1px solid var(--ps-accent);
        }

        .palette-label {
            font-size: 11px;
            color: var(--ps-text-dim);
            margin-right: 4px;
        }

        /* =================== VÙNG GIỮA =================== */
        .center-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .canvas-viewport {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--ps-bg-darkest);
            background-image:
                linear-gradient(45deg, var(--ps-canvas-checker-a) 25%, transparent 25%),
                linear-gradient(-45deg, var(--ps-canvas-checker-a) 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, var(--ps-canvas-checker-a) 75%),
                linear-gradient(-45deg, transparent 75%, var(--ps-canvas-checker-a) 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
            position: relative;
            overflow: auto;
        }

        .canvas-stack {
            position: relative;
            box-shadow: 0 0 0 1px #000, 0 8px 32px rgba(0, 0, 0, 0.6);
            flex-shrink: 0;
        }

        .canvas-stack canvas {
            position: absolute;
            top: 0;
            left: 0;
            background-color: transparent;
        }

        #bgCanvas {
            background-color: #ffffff;
        }

        #drawCanvas {
            cursor: crosshair;
        }

        .canvas-region-select {
            position: absolute;
            border: 1.5px dashed var(--ps-accent);
            background-color: rgba(61, 142, 255, 0.12);
            pointer-events: none;
            display: none;
            z-index: 50;
        }

        .status-bar {
            height: 26px;
            background-color: var(--ps-bg-dark);
            border-top: 1px solid var(--ps-border);
            display: flex;
            align-items: center;
            padding: 0 14px;
            font-size: 11px;
            color: var(--ps-text-dim);
            gap: 16px;
            flex-shrink: 0;
        }

        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: auto;
        }

        .zoom-btn {
            background: none;
            border: none;
            color: var(--ps-text-dim);
            cursor: pointer;
            font-size: 11px;
            padding: 2px 6px;
        }

        .zoom-btn:hover {
            color: var(--ps-text);
        }

        /* =================== PANEL PHẢI =================== */
        .right-panel {
            width: 230px;
            background-color: var(--ps-bg-dark);
            border-left: 1px solid var(--ps-border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .panel-section {
            border-bottom: 1px solid var(--ps-border);
        }

        .panel-section-header {
            padding: 8px 12px;
            font-size: 11px;
            font-weight: 600;
            color: var(--ps-text-dim);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            background-color: var(--ps-bg-mid);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-section-header .header-btn {
            background: none;
            border: none;
            color: var(--ps-text-dim);
            cursor: pointer;
            font-size: 11px;
        }

        .panel-section-header .header-btn:hover {
            color: var(--ps-accent);
        }

        .layer-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            font-size: 12px;
            border-bottom: 1px solid var(--ps-border);
            cursor: pointer;
        }

        .layer-item:hover {
            background-color: var(--ps-bg-light);
        }

        .layer-item.selected {
            background-color: #2a4d7a;
        }

        .layer-thumb {
            width: 26px;
            height: 26px;
            background-color: #fff;
            border-radius: 2px;
            border: 1px solid var(--ps-border);
            flex-shrink: 0;
        }

        .layer-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .layer-toggle-visible {
            background: none;
            border: none;
            color: var(--ps-text-dim);
            cursor: pointer;
            font-size: 11px;
            flex-shrink: 0;
        }

        .layer-toggle-visible.hidden-layer {
            color: #555;
        }

        .layer-opacity-row {
            padding: 4px 10px 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .layer-opacity-row input[type="range"] {
            flex: 1;
            accent-color: var(--ps-accent);
        }

        .layer-opacity-row span {
            font-size: 10px;
            color: var(--ps-text-dim);
            width: 30px;
            text-align: right;
        }

        .history-list {
            max-height: 180px;
            overflow-y: auto;
        }

        .history-item {
            padding: 5px 12px;
            font-size: 10.5px;
            color: var(--ps-text-dim);
            border-bottom: 1px solid var(--ps-border);
        }

        .history-item.current {
            color: var(--ps-text);
            background-color: var(--ps-bg-light);
        }

        /* ============================================================
           MODAL AI SUPPORT
           ============================================================ */
        .ai-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.65);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }

        .ai-modal-box {
            width: 480px;
            max-width: 90%;
            background-color: var(--ps-bg-dark);
            border: 1px solid var(--ps-bg-light);
            border-radius: 6px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.5);
            color: var(--ps-text);
            font-family: "Segoe UI", Arial, sans-serif;
        }

        .ai-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid var(--ps-border);
        }

        .ai-modal-header h5 {
            font-size: 14px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ai-modal-header h5 i {
            color: var(--ps-accent);
        }

        .ai-modal-close {
            background: none;
            border: none;
            color: var(--ps-text-dim);
            font-size: 16px;
            cursor: pointer;
            width: 26px;
            height: 26px;
            border-radius: 4px;
        }

        .ai-modal-close:hover {
            background-color: var(--ps-bg-light);
            color: #fff;
        }

        .ai-modal-body {
            padding: 16px;
        }

        .ai-feature-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .ai-feature-card {
            border: 1px solid var(--ps-bg-light);
            border-radius: 5px;
            padding: 11px;
            cursor: pointer;
            text-align: left;
            background-color: var(--ps-bg-mid);
            color: var(--ps-text);
            font-family: inherit;
        }

        .ai-feature-card:hover {
            background-color: var(--ps-bg-light);
            border-color: var(--ps-accent);
        }

        .ai-feature-card i {
            font-size: 16px;
            color: var(--ps-accent);
            margin-bottom: 6px;
            display: block;
        }

        .ai-feature-name {
            font-weight: 600;
            font-size: 12.5px;
            margin-bottom: 3px;
        }

        .ai-feature-desc {
            font-size: 10.5px;
            color: var(--ps-text-dim);
            line-height: 1.4;
        }

        .ai-detail-view {
            display: none;
        }

        .ai-detail-back {
            background: none;
            border: none;
            font-size: 12px;
            color: var(--ps-accent);
            cursor: pointer;
            margin-bottom: 10px;
            padding: 0;
        }

        .ai-detail-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .ai-region-row {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .ai-region-label {
            font-size: 11px;
            color: var(--ps-text-dim);
        }

        .ai-region-btn {
            font-size: 11px;
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid var(--ps-bg-light);
            background-color: var(--ps-bg-mid);
            color: var(--ps-text);
            cursor: pointer;
        }

        .ai-region-btn.active {
            background-color: var(--ps-accent);
            border-color: var(--ps-accent);
            color: #fff;
        }

        .ai-region-status {
            font-size: 10.5px;
            color: var(--ps-text-dim);
            margin-bottom: 10px;
            display: block;
        }

        .ai-prompt-input {
            width: 100%;
            min-height: 64px;
            padding: 8px 10px;
            border: 1px solid var(--ps-bg-light);
            border-radius: 4px;
            background-color: var(--ps-bg-darkest);
            color: var(--ps-text);
            font-family: inherit;
            font-size: 12.5px;
            resize: vertical;
        }

        .ai-prompt-input::placeholder {
            color: var(--ps-text-dim);
        }

        .ai-modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid var(--ps-border);
        }

        .ai-btn-run {
            background-color: var(--ps-accent);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 4px;
            font-size: 12.5px;
            font-weight: 600;
            cursor: pointer;
        }

        .ai-btn-run:hover {
            background-color: var(--ps-accent-hover);
        }

        .ai-btn-secondary {
            background-color: var(--ps-bg-mid);
            color: var(--ps-text);
            border: 1px solid var(--ps-bg-light);
            padding: 8px 18px;
            border-radius: 4px;
            font-size: 12.5px;
            cursor: pointer;
        }

        .ai-btn-secondary:hover {
            background-color: var(--ps-bg-light);
        }

        .ai-loading-view,
        .ai-result-view {
            display: none;
            text-align: center;
        }

        .ai-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--ps-bg-light);
            border-top-color: var(--ps-accent);
            border-radius: 50%;
            margin: 18px auto 12px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .ai-result-text {
            text-align: left;
            white-space: pre-wrap;
            font-size: 12.5px;
            line-height: 1.6;
            max-height: 240px;
            overflow-y: auto;
            background-color: var(--ps-bg-darkest);
            border: 1px solid var(--ps-bg-light);
            border-radius: 5px;
            padding: 12px;
            margin-top: 8px;
        }

        .ai-result-image {
            max-width: 100%;
            border-radius: 5px;
            margin-top: 8px;
            border: 1px solid var(--ps-bg-light);
        }

        .ai-error-text {
            color: #ff6b6b;
            font-size: 12.5px;
            margin-top: 8px;
            text-align: left;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo">SANKYUU
            <p class="name">Draw Test — AI Support</p>
        </div>
        <div class="header-actions">
            <a th:href="@{/manga/logout}">
                <button type="button" class="btn-icon" aria-label="Logout">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                </button>
            </a>
        </div>
    </div>

    <div class="draw-wrapper">
        <!-- ============ TOOLBAR TRÁI ============ -->
        <div class="left-toolbar">
            <button type="button" class="lt-btn active" data-tool="pencil" title="Bút vẽ (B)">
                <i class="fa-solid fa-pencil"></i>
            </button>
            <button type="button" class="lt-btn" data-tool="brush" title="Cọ mềm (cạnh mờ)">
                <i class="fa-solid fa-paintbrush"></i>
            </button>
            <button type="button" class="lt-btn" data-tool="eraser" title="Tẩy (E)">
                <i class="fa-solid fa-eraser"></i>
            </button>
            <button type="button" class="lt-btn" data-tool="bucket" title="Đổ màu (Bucket fill)">
                <i class="fa-solid fa-fill-drip"></i>
            </button>

            <div class="lt-divider"></div>

            <button type="button" class="lt-btn" data-tool="line" title="Đường thẳng">
                <i class="fa-solid fa-slash"></i>
            </button>
            <button type="button" class="lt-btn" data-tool="rect" title="Hình chữ nhật">
                <i class="fa-regular fa-square"></i>
            </button>
            <button type="button" class="lt-btn" data-tool="oval" title="Hình tròn / Oval (balloon)">
                <i class="fa-regular fa-circle"></i>
            </button>
            <button type="button" class="lt-btn" data-tool="text" title="Chèn chữ (Lettering)">
                <i class="fa-solid fa-font"></i>
            </button>

            <div class="lt-divider"></div>

            <button type="button" class="lt-btn" data-tool="select" title="Chọn vùng (M)">
                <i class="fa-solid fa-vector-square"></i>
            </button>
            <button type="button" class="lt-btn" id="toolEyedrop" title="Lấy màu từ canvas">
                <i class="fa-solid fa-eye-dropper"></i>
            </button>

            <div class="lt-divider"></div>

            <button type="button" class="lt-btn" id="toolUndo" title="Hoàn tác (Ctrl+Z)">
                <i class="fa-solid fa-rotate-left"></i>
            </button>
            <button type="button" class="lt-btn" id="toolClear" title="Xóa toàn bộ layer hiện tại">
                <i class="fa-solid fa-trash"></i>
            </button>

            <div class="lt-divider"></div>

            <div class="lt-swatch-wrap">
                <input type="color" class="lt-color-fg" id="penColor" value="#1a1a1a" title="Màu nét vẽ">
                <div class="lt-color-bg"></div>
            </div>
        </div>

        <!-- ============ KHỐI CHÍNH ============ -->
        <div class="center-area">
            <div class="top-property-bar" id="topPropertyBar">
                <div class="prop-group">
                    <span class="prop-label">Cỡ nét</span>
                    <input type="range" id="penSize" min="1" max="60" value="6">
                    <span class="prop-value" id="penSizeValue">6</span>
                </div>
                <div class="prop-divider"></div>
                <div class="prop-group">
                    <span class="prop-label">Độ mờ</span>
                    <input type="range" id="penOpacity" min="10" max="100" value="100">
                    <span class="prop-value" id="penOpacityValue">100%</span>
                </div>
                <div class="prop-divider"></div>

                <!-- Tuỳ chọn riêng cho shape: fill hay outline -->
                <div class="prop-group" id="shapeFillGroup" style="display:none;">
                    <span class="prop-label">Kiểu</span>
                    <div class="shape-fill-toggle">
                        <button type="button" class="shape-fill-btn active" data-fillmode="outline">Viền</button>
                        <button type="button" class="shape-fill-btn" data-fillmode="filled">Tô đầy</button>
                    </div>
                </div>

                <!-- Tuỳ chọn riêng cho text -->
                <div class="prop-group" id="textSizeGroup" style="display:none;">
                    <span class="prop-label">Cỡ chữ</span>
                    <input type="range" id="textSize" min="10" max="72" value="24">
                    <span class="prop-value" id="textSizeValue">24</span>
                </div>

                <button type="button" class="btn-ai-support-top" id="btnAiSupport">
                    <i class="fa-solid fa-brain"></i>
                    AI Support
                </button>
            </div>

            <div class="color-palette-bar">
                <span class="palette-label">Palette</span>
                <div class="palette-swatch" style="background:#000000" data-color="#000000"></div>
                <div class="palette-swatch" style="background:#ffffff" data-color="#ffffff"></div>
                <div class="palette-swatch" style="background:#7f7f7f" data-color="#7f7f7f"></div>
                <div class="palette-swatch" style="background:#c3c3c3" data-color="#c3c3c3"></div>
                <div class="palette-swatch" style="background:#ff0000" data-color="#ff0000"></div>
                <div class="palette-swatch" style="background:#ff7f00" data-color="#ff7f00"></div>
                <div class="palette-swatch" style="background:#ffff00" data-color="#ffff00"></div>
                <div class="palette-swatch" style="background:#00ff00" data-color="#00ff00"></div>
                <div class="palette-swatch" style="background:#00ffff" data-color="#00ffff"></div>
                <div class="palette-swatch" style="background:#0078ff" data-color="#0078ff"></div>
                <div class="palette-swatch" style="background:#7f00ff" data-color="#7f00ff"></div>
                <div class="palette-swatch" style="background:#ff00ff" data-color="#ff00ff"></div>
                <div class="palette-swatch" style="background:#8b4513" data-color="#8b4513"></div>
                <div class="palette-swatch" style="background:#ffc0cb" data-color="#ffc0cb"></div>
                <div class="palette-swatch" style="background:#ffd700" data-color="#ffd700"></div>
                <div class="palette-swatch" style="background:#2e8b57" data-color="#2e8b57"></div>
            </div>

            <div class="canvas-viewport" id="canvasViewport">
                <div class="canvas-stack" id="canvasStack" style="width:800px; height:600px;">
                    <canvas id="bgCanvas" width="800" height="600"></canvas>
                    <canvas id="layer2Canvas" width="800" height="600"></canvas>

                    <button type="button" class="zoom-btn" id="zoomOut"><i
                            class="fa-solid fa-magnifying-glass-minus"></i></button>
                    <span id="zoomValue">100%</span>

                            class="fa-solid fa-magnifying-glass-plus"></i></button>

        <!-- ============ PANEL PHẢI ============ -->
        <div class="right-panel">

                    <div class="ai-detail-title" id="aiResultTitle">Kết quả</div>

                    <div id="aiResultText" class="ai-result-text" style="display: none;"></div>

    <script th:inline="javascript">
        // ========================================================
        // PHẦN 1: Quản lý nhiều layer (mỗi layer = 1 canvas riêng)
        // ========================================================
        const CANVAS_W = 800, CANVAS_H = 600;
        const canvasStack = document.getElementById('canvasStack');

        // Cấu trúc layer: { id, name, canvas, ctx, visible, opacity }
        let layers = [];
        let activeLayerIndex = 0;
        let layerCounter = 0;

        function createLayerCanvas(zIndex) {
            const c = document.createElement('canvas');
            c.width = CANVAS_W;
            c.height = CANVAS_H;
            c.style.position = 'absolute';
            c.style.top = '0';
            c.style.left = '0';
            c.style.zIndex = zIndex;
            c.style.pointerEvents = 'none';
            return c;
        }

        function addLayer(name, isBackground) {
            layerCounter++;
            const canvasEl = createLayerCanvas(layers.length + 1);
            canvasStack.insertBefore(canvasEl, document.getElementById('regionSelectBox'));
            const ctxL = canvasEl.getContext('2d');
            if (isBackground) {
                ctxL.fillStyle = '#ffffff';
                ctxL.fillRect(0, 0, CANVAS_W, CANVAS_H);
            }
            const layer = {
                id: layerCounter,
                name: name || ('Layer ' + layerCounter),
                canvas: canvasEl,
                ctx: ctxL,
                visible: true,
                opacity: 100
            };
            layers.push(layer);
            renderLayerList();
            return layer;
        }

        // Layer nền trắng (luôn có, không xoá được)
        const baseLayer = addLayer('Nền (trắng)', true);
        baseLayer.isBase = true;
        // Layer vẽ chính, đang active
        const mainLayer = addLayer('Layer 1', false);
        activeLayerIndex = layers.length - 1;

        function getActiveLayer() {
            return layers[activeLayerIndex];
        }

        function renderLayerList() {
            const listEl = document.getElementById('layerList');
            listEl.innerHTML = '';
            // hiện từ layer trên cùng (cuối array) xuống dưới
            for (let i = layers.length - 1; i >= 0; i--) {
                const layer = layers[i];
                const item = document.createElement('div');
                item.className = 'layer-item' + (i === activeLayerIndex ? ' selected' : '');
                item.innerHTML = `
                    <button type="button" class="layer-toggle-visible ${layer.visible ? '' : 'hidden-layer'}" data-idx="${i}">
                        <i class="fa-solid ${layer.visible ? 'fa-eye' : 'fa-eye-slash'}"></i>
                    </button>
                    <div class="layer-thumb"></div>
                    <span class="layer-name">${layer.name}</span>
                `;
                item.addEventListener('click', (e) => {
                    if (e.target.closest('.layer-toggle-visible')) return;
                    activeLayerIndex = i;
                    renderLayerList();
                });
                listEl.appendChild(item);

                if (i === activeLayerIndex) {
                    const opacityRow = document.createElement('div');
                    opacityRow.className = 'layer-opacity-row';
                    opacityRow.innerHTML = `
                        <span style="font-size:10px;color:var(--ps-text-dim);">Opacity</span>
                        <input type="range" min="0" max="100" value="${layer.opacity}" data-idx="${i}" class="layer-opacity-slider">
                        <span>${layer.opacity}%</span>
                    `;
                    listEl.appendChild(opacityRow);
                }
            }

            listEl.querySelectorAll('.layer-toggle-visible').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.dataset.idx);
                    layers[idx].visible = !layers[idx].visible;
                    layers[idx].canvas.style.display = layers[idx].visible ? 'block' : 'none';
                    renderLayerList();
                });
            });

            listEl.querySelectorAll('.layer-opacity-slider').forEach(slider => {
                slider.addEventListener('input', () => {
                    const idx = parseInt(slider.dataset.idx);
                    layers[idx].opacity = slider.value;
                    layers[idx].canvas.style.opacity = slider.value / 100;
                    slider.nextElementSibling.textContent = slider.value + '%';
                });
            });
        }

        document.getElementById('btnAddLayer').addEventListener('click', () => {
            const newLayer = addLayer('Layer ' + (layerCounter + 1), false);
            activeLayerIndex = layers.length - 1;
            renderLayerList();
            pushHistoryEntry('Thêm layer mới');
        });

        // ========================================================
        // PHẦN 2: Vẽ trên layer đang active (vẽ trực tiếp vào canvas của layer đó)
        // ========================================================
        // Để đơn giản hoá việc bắt sự kiện chuột, ta dùng 1 lớp "input layer" trong suốt
        // nằm trên cùng để nhận event, rồi vẽ vào canvas của activeLayer.
        const inputLayer = document.getElementById('drawCanvas');
        inputLayer.style.zIndex = 999;
        inputLayer.style.pointerEvents = 'auto';

        let isDrawing = false;
        let currentTool = 'pencil';
        let history = [];
        let shapeStart = null;
        let shapeFillMode = 'outline';

        const historyListEl = document.getElementById('historyList');

        function snapshotAllLayers() {
            // Lưu trạng thái toàn bộ layer hiện có (đơn giản hoá: lưu canvas của activeLayer)
            return { idx: activeLayerIndex, data: getActiveLayer().canvas.toDataURL() };
        }

        function pushHistoryEntry(label) {
            history.push(snapshotAllLayers());
            if (history.length > 30) history.shift();
            const item = document.createElement('div');
            item.className = 'history-item current';
            item.textContent = label;
            Array.from(historyListEl.children).forEach(c => c.classList.remove('current'));
            historyListEl.appendChild(item);
            historyListEl.scrollTop = historyListEl.scrollHeight;
        }
        pushHistoryEntry('Tạo canvas mới');

        function getPos(e) {
            const rect = inputLayer.getBoundingClientRect();
            const src = e.touches ? e.touches[0] : e;
            return {
                x: (src.clientX - rect.left) * (CANVAS_W / rect.width),
                y: (src.clientY - rect.top) * (CANVAS_H / rect.height)
            };
        }

        function getFgColor() {
            return document.getElementById('penColor').value;
        }

        function getOpacity() {
            return document.getElementById('penOpacity').value / 100;
        }

        function getSize() {
            return document.getElementById('penSize').value;
        }

        // ---- Bucket fill (flood fill) ----
        function floodFill(ctxTarget, startX, startY, fillColorHex) {
            startX = Math.floor(startX);
            startY = Math.floor(startY);
            const imgData = ctxTarget.getImageData(0, 0, CANVAS_W, CANVAS_H);
            const data = imgData.data;

            const fillColor = hexToRgba(fillColorHex);
            const startIdx = (startY * CANVAS_W + startX) * 4;
            const targetColor = [data[startIdx], data[startIdx + 1], data[startIdx + 2], data[startIdx + 3]];

            if (colorsMatch(targetColor, fillColor)) return;

            const stack = [[startX, startY]];
            const visited = new Uint8Array(CANVAS_W * CANVAS_H);

            while (stack.length) {
                const [x, y] = stack.pop();
                if (x < 0 || x >= CANVAS_W || y < 0 || y >= CANVAS_H) continue;
                const pos = y * CANVAS_W + x;
                if (visited[pos]) continue;

                const idx = pos * 4;
                const currentColor = [data[idx], data[idx + 1], data[idx + 2], data[idx + 3]];
                if (!colorsMatch(currentColor, targetColor)) continue;

                visited[pos] = 1;
                data[idx] = fillColor[0];
                data[idx + 1] = fillColor[1];
                data[idx + 2] = fillColor[2];
                data[idx + 3] = fillColor[3];

                stack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
            }
            ctxTarget.putImageData(imgData, 0, 0);
        }

        function colorsMatch(a, b) {
            return Math.abs(a[0] - b[0]) < 12 && Math.abs(a[1] - b[1]) < 12 &&
                Math.abs(a[2] - b[2]) < 12 && Math.abs(a[3] - b[3]) < 12;
        }

        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return [r, g, b, alpha !== undefined ? Math.round(alpha * 255) : 255];
        }

        // ---- Text tool state ----
        let pendingTextPos = null;

        function placeTextAt(pos) {
            const text = prompt('Nhập nội dung chữ:');
            if (!text) return;
            const layerCtx = getActiveLayer().ctx;
            layerCtx.globalAlpha = getOpacity();
            layerCtx.fillStyle = getFgColor();
            layerCtx.font = document.getElementById('textSize').value + 'px Arial';
            layerCtx.textBaseline = 'top';
            layerCtx.fillText(text, pos.x, pos.y);
            layerCtx.globalAlpha = 1;
            pushHistoryEntry('Chèn chữ: "' + text.substring(0, 20) + '"');
        }

        // ---- Mouse events chính ----
        inputLayer.addEventListener('mousedown', (e) => {
            if (currentTool === 'select') return;
            const p = getPos(e);
            const layerCtx = getActiveLayer().ctx;

            if (currentTool === 'pencil' || currentTool === 'brush' || currentTool === 'eraser') {
                isDrawing = true;
                layerCtx.beginPath();
                layerCtx.moveTo(p.x, p.y);
            } else if (currentTool === 'bucket') {
                floodFill(layerCtx, p.x, p.y, currentTool === 'eraser' ? '#ffffff' : getFgColor());
                pushHistoryEntry('Đổ màu');
            } else if (currentTool === 'line' || currentTool === 'rect' || currentTool === 'oval') {
                shapeStart = p;
                isDrawing = true;
            } else if (currentTool === 'text') {
                placeTextAt(p);
            }
        });

        inputLayer.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const p = getPos(e);
            const layerCtx = getActiveLayer().ctx;

            if (currentTool === 'pencil' || currentTool === 'brush' || currentTool === 'eraser') {
                layerCtx.lineWidth = getSize();
                layerCtx.lineCap = currentTool === 'brush' ? 'round' : 'round';
                layerCtx.lineJoin = 'round';
                layerCtx.globalAlpha = currentTool === 'brush' ? getOpacity() * 0.6 : getOpacity();
                layerCtx.strokeStyle = currentTool === 'eraser' ? '#ffffff' : getFgColor();
                if (currentTool === 'eraser') {
                    // Tẩy: vẽ lại màu trắng đè lên (đơn giản hoá, không dùng destination-out
                    // để layer nền trắng không bị ảnh hưởng khi xoá layer trên)
                    layerCtx.globalCompositeOperation = 'source-over';
                }
                layerCtx.lineTo(p.x, p.y);
                layerCtx.stroke();
            } else if (currentTool === 'line' || currentTool === 'rect' || currentTool === 'oval') {
                // Vẽ shape preview lên input layer (canvas tạm phía trên), xoá sau khi xong
                redrawShapePreview(shapeStart, p);
            }
        });

        window.addEventListener('mouseup', (e) => {
            if (!isDrawing) return;
            const layerCtx = getActiveLayer().ctx;

            if (currentTool === 'pencil' || currentTool === 'brush' || currentTool === 'eraser') {
                layerCtx.globalAlpha = 1;
                pushHistoryEntry(currentTool === 'eraser' ? 'Tẩy' : (currentTool === 'brush' ? 'Vẽ cọ mềm' : 'Vẽ nét'));
            } else if ((currentTool === 'line' || currentTool === 'rect' || currentTool === 'oval') && shapeStart) {
                const p = getPos(e);
                commitShape(shapeStart, p);
                clearShapePreview();
                pushHistoryEntry('Vẽ hình ' + currentTool);
                shapeStart = null;
            }
            isDrawing = false;
        });

        // ---- Shape preview (vẽ tạm lên input layer rồi commit vào layer thật) ----
        const previewCtx = inputLayer.getContext('2d');

        function clearShapePreview() {
            previewCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
        }

        function drawShapeOnContext(ctxTarget, start, end) {
            ctxTarget.lineWidth = getSize();
            ctxTarget.strokeStyle = getFgColor();
            ctxTarget.fillStyle = getFgColor();
            ctxTarget.globalAlpha = getOpacity();
            ctxTarget.beginPath();

            if (currentTool === 'line') {
                ctxTarget.moveTo(start.x, start.y);
                ctxTarget.lineTo(end.x, end.y);
                ctxTarget.stroke();
            } else if (currentTool === 'rect') {
                const w = end.x - start.x, h = end.y - start.y;
                if (shapeFillMode === 'filled') ctxTarget.fillRect(start.x, start.y, w, h);
                else ctxTarget.strokeRect(start.x, start.y, w, h);
            } else if (currentTool === 'oval') {
                const cx = (start.x + end.x) / 2, cy = (start.y + end.y) / 2;
                const rx = Math.abs(end.x - start.x) / 2, ry = Math.abs(end.y - start.y) / 2;
                ctxTarget.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
                if (shapeFillMode === 'filled') ctxTarget.fill();
                else ctxTarget.stroke();
            }
            ctxTarget.globalAlpha = 1;
        }

        function redrawShapePreview(start, end) {
            clearShapePreview();
            drawShapeOnContext(previewCtx, start, end);
        }

        function commitShape(start, end) {
            const layerCtx = getActiveLayer().ctx;
            drawShapeOnContext(layerCtx, start, end);
        }

        // ========================================================
        // PHẦN 3: Toolbar — chọn tool, fill mode, eyedropper
        // ========================================================
        document.querySelectorAll('.lt-btn[data-tool]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.lt-btn[data-tool]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.dataset.tool;

                const labels = {
                    pencil: 'Bút vẽ', brush: 'Cọ mềm', eraser: 'Tẩy', bucket: 'Đổ màu',
                    line: 'Đường thẳng', rect: 'Hình chữ nhật', oval: 'Hình tròn/Oval',
                    text: 'Chèn chữ', select: 'Chọn vùng'
                };
                document.getElementById('statusTool').textContent = 'Công cụ: ' + labels[currentTool];
                inputLayer.style.cursor = currentTool === 'select' ? 'cell' : (currentTool === 'text' ? 'text' : 'crosshair');

                // Hiện/ẩn property phù hợp
                const isShape = ['line', 'rect', 'oval'].includes(currentTool);
                document.getElementById('shapeFillGroup').style.display = isShape ? 'flex' : 'none';
                document.getElementById('textSizeGroup').style.display = currentTool === 'text' ? 'flex' : 'none';
            });
        });

        document.querySelectorAll('.shape-fill-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.shape-fill-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                shapeFillMode = btn.dataset.fillmode;
            });
        });

        document.getElementById('toolEyedrop').addEventListener('click', () => {
            const handler = (e) => {
                const p = getPos(e);
                const layerCtx = getActiveLayer().ctx;
                const pixel = layerCtx.getImageData(p.x, p.y, 1, 1).data;
                const hex = '#' + [pixel[0], pixel[1], pixel[2]].map(v => v.toString(16).padStart(2, '0')).join('');
                document.getElementById('penColor').value = hex;
                inputLayer.removeEventListener('click', handler);
            };
            inputLayer.addEventListener('click', handler);
        });

        // Palette nhanh
        document.querySelectorAll('.palette-swatch').forEach(sw => {
            sw.addEventListener('click', () => {
                document.getElementById('penColor').value = sw.dataset.color;
            });
        });

        // Slider hiển thị giá trị
        const penSizeEl = document.getElementById('penSize');
        penSizeEl.addEventListener('input', () => document.getElementById('penSizeValue').textContent = penSizeEl.value);
        const penOpacityEl = document.getElementById('penOpacity');
        penOpacityEl.addEventListener('input', () => document.getElementById('penOpacityValue').textContent = penOpacityEl.value + '%');
        const textSizeEl = document.getElementById('textSize');
        textSizeEl.addEventListener('input', () => document.getElementById('textSizeValue').textContent = textSizeEl.value);

        // Undo / Clear
        document.getElementById('toolUndo').addEventListener('click', () => {
            if (history.length <= 1) return;
            history.pop();
            const prev = history[history.length - 1];
            const layer = layers[prev.idx];
            const img = new Image();
            img.onload = () => {
                layer.ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
                layer.ctx.drawImage(img, 0, 0);
            };
            img.src = prev.data;
            if (historyListEl.lastChild) historyListEl.removeChild(historyListEl.lastChild);
        });

        document.getElementById('toolClear').addEventListener('click', () => {
            if (!confirm('Xóa toàn bộ nội dung của layer đang chọn?')) return;
            const layer = getActiveLayer();
            layer.ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
            if (layer.isBase) {
                layer.ctx.fillStyle = '#ffffff';
                layer.ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            }
            pushHistoryEntry('Xóa layer "' + layer.name + '"');
        });

        // ========================================================
        // PHẦN 4: Region selection
        // ========================================================
        let selectionRect = null;
        let isSelecting = false;
        let selStart = null;
        const regionBox = document.getElementById('regionSelectBox');
        const canvasViewport = document.getElementById('canvasViewport');

        inputLayer.addEventListener('mousedown', (e) => {
            if (currentTool !== 'select') return;
            isSelecting = true;
            selStart = getPos(e);
            regionBox.style.display = 'block';
        });

        inputLayer.addEventListener('mousemove', (e) => {
            if (currentTool !== 'select' || !isSelecting) return;
            const p = getPos(e);
            const rectCanvas = inputLayer.getBoundingClientRect();
            const rectViewport = canvasStack.getBoundingClientRect();
            const scaleX = rectCanvas.width / CANVAS_W;
            const scaleY = rectCanvas.height / CANVAS_H;

            selectionRect = {
                x: Math.min(selStart.x, p.x),
                y: Math.min(selStart.y, p.y),
                w: Math.abs(p.x - selStart.x),
                h: Math.abs(p.y - selStart.y)
            };

            regionBox.style.left = (selectionRect.x * scaleX) + 'px';
            regionBox.style.top = (selectionRect.y * scaleY) + 'px';
            regionBox.style.width = (selectionRect.w * scaleX) + 'px';
            regionBox.style.height = (selectionRect.h * scaleY) + 'px';
        });

        window.addEventListener('mouseup', () => {
            if (currentTool === 'select' && isSelecting && selectionRect && selectionRect.w > 5) {
                document.getElementById('statusRegion').textContent =
                    `Vùng AI: ${Math.round(selectionRect.w)}×${Math.round(selectionRect.h)}px`;
            }
            isSelecting = false;
        });

        // ========================================================
        // PHẦN 5: Zoom canvas (CSS transform scale đơn giản)
        // ========================================================
        let zoomLevel = 1;

        function applyZoom() {
            canvasStack.style.transform = `scale(${zoomLevel})`;
            canvasStack.style.transformOrigin = 'center center';
            document.getElementById('zoomValue').textContent = Math.round(zoomLevel * 100) + '%';
        }

        document.getElementById('zoomIn').addEventListener('click', () => {
            zoomLevel = Math.min(zoomLevel + 0.25, 3);
            applyZoom();
        });
        document.getElementById('zoomOut').addEventListener('click', () => {
            zoomLevel = Math.max(zoomLevel - 0.25, 0.25);
            applyZoom();
        });
        document.getElementById('zoomReset').addEventListener('click', () => {
            zoomLevel = 1;
            applyZoom();
        });
        canvasViewport.addEventListener('wheel', (e) => {
            if (!e.ctrlKey) return;
            e.preventDefault();
            zoomLevel = Math.min(Math.max(zoomLevel + (e.deltaY < 0 ? 0.1 : -0.1), 0.25), 3);
            applyZoom();
        });

        // ========================================================
        // PHẦN 6: Modal AI Support
        // ========================================================
        const aiModalOverlay = document.getElementById('aiModalOverlay');
        const aiFeatureListView = document.getElementById('aiFeatureListView');
        const aiDetailView = document.getElementById('aiDetailView');
        const aiLoadingView = document.getElementById('aiLoadingView');
        const aiResultView = document.getElementById('aiResultView');

        let selectedFeature = null;
        let regionMode = 'full';

        function openAiModal() { aiModalOverlay.style.display = 'flex'; }
        function closeAiModal() { aiModalOverlay.style.display = 'none'; }

        function showFeatureListView() {
            aiFeatureListView.style.display = 'block';
            aiDetailView.style.display = 'none';
            aiLoadingView.style.display = 'none';
            aiResultView.style.display = 'none';
        }
        function showAiDetailView() {
            aiFeatureListView.style.display = 'none';
            aiDetailView.style.display = 'block';
            aiLoadingView.style.display = 'none';
            aiResultView.style.display = 'none';
        }
        function showAiLoadingView() {
            aiFeatureListView.style.display = 'none';
            aiDetailView.style.display = 'none';
            aiLoadingView.style.display = 'block';
            aiResultView.style.display = 'none';
        }
        function showAiResultView() {
            aiFeatureListView.style.display = 'none';
            aiDetailView.style.display = 'none';
            aiLoadingView.style.display = 'none';
            aiResultView.style.display = 'block';
        }

        document.getElementById('btnAiSupport').addEventListener('click', () => {
            showFeatureListView();
            openAiModal();
        });
        document.getElementById('btnCloseAiModal').addEventListener('click', closeAiModal);
        aiModalOverlay.addEventListener('click', (e) => { if (e.target === aiModalOverlay) closeAiModal(); });

        document.querySelectorAll('.ai-feature-card').forEach(card => {
            card.addEventListener('click', () => {
                selectedFeature = {
                    code: card.dataset.feature,
                    name: card.dataset.name,
                    type: card.dataset.type
                };
                document.getElementById('aiDetailTitle').textContent = selectedFeature.name;
                document.getElementById('aiPromptInput').value = '';
                showAiDetailView();
            });
        });

        document.getElementById('btnBackToFeatureList').addEventListener('click', showFeatureListView);
        document.getElementById('btnAiResultBack').addEventListener('click', showFeatureListView);

        document.querySelectorAll('.ai-region-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.ai-region-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                regionMode = btn.dataset.region;
                const statusEl = document.getElementById('aiRegionStatus');
                if (regionMode === 'full') {
                    statusEl.textContent = 'Sẽ áp dụng cho toàn bộ canvas';
                } else if (selectionRect && selectionRect.w > 5) {
                    statusEl.textContent = `Sẽ áp dụng cho vùng đã chọn (${Math.round(selectionRect.w)}×${Math.round(selectionRect.h)}px)`;
                } else {
                    statusEl.textContent = 'Chưa có vùng nào — đóng modal, chọn tool "Chọn vùng" rồi kéo trên canvas';
                }
            });
        });

        // ========================================================
        // PHẦN 7: Gộp tất cả layer thành 1 ảnh rồi gọi /api/ai/run
        // ========================================================
        function flattenAllLayers() {
            const flat = document.createElement('canvas');
            flat.width = CANVAS_W;
            flat.height = CANVAS_H;
            const flatCtx = flat.getContext('2d');
            layers.forEach(layer => {
                if (!layer.visible) return;
                flatCtx.globalAlpha = layer.opacity / 100;
                flatCtx.drawImage(layer.canvas, 0, 0);
            });
            flatCtx.globalAlpha = 1;
            return flat;
        }

        function canvasRegionToBase64() {
            const flat = flattenAllLayers();
            if (regionMode === 'select' && selectionRect && selectionRect.w > 5) {
                const tmp = document.createElement('canvas');
                tmp.width = selectionRect.w;
                tmp.height = selectionRect.h;
                const tmpCtx = tmp.getContext('2d');
                tmpCtx.drawImage(
                    flat,
                    selectionRect.x, selectionRect.y, selectionRect.w, selectionRect.h,
                    0, 0, selectionRect.w, selectionRect.h
                );
                return tmp.toDataURL('image/png').split(',')[1];
            }
            return flat.toDataURL('image/png').split(',')[1];
        }

        document.getElementById('btnRunAi').addEventListener('click', async () => {
            if (!selectedFeature) return;

            const promptVal = document.getElementById('aiPromptInput').value;
            const imageBase64 = canvasRegionToBase64();

            showAiLoadingView();

            try {
                const response = await fetch('/api/ai/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        feature: selectedFeature.code,
                        prompt: promptVal,
                        imageBase64: imageBase64
                    })
                });

                const data = await response.json();
                renderAiResult(data);

            } catch (err) {
                renderAiResult({ status: 'error', message: 'Không thể kết nối tới server: ' + err.message });
            }
        });

        function renderAiResult(data) {
            showAiResultView();
            const titleEl = document.getElementById('aiResultTitle');
            const imgEl = document.getElementById('aiResultImage');
            const textEl = document.getElementById('aiResultText');
            const errEl = document.getElementById('aiErrorText');

            imgEl.style.display = 'none';
            textEl.style.display = 'none';
            errEl.style.display = 'none';

            if (data.status === 'success') {
                titleEl.textContent = 'Hoàn thành — ' + (selectedFeature ? selectedFeature.name : '');

                if (data.type === 'image_base64' || data.type === 'image') {
                    imgEl.src = data.type === 'image_base64'
                        ? 'data:image/png;base64,' + data.result
                        : data.result;
                    imgEl.style.display = 'block';
                } else if (data.type === 'text') {
                    textEl.textContent = data.result;
                    textEl.style.display = 'block';
                }
            } else {
                titleEl.textContent = 'Có lỗi xảy ra';
                errEl.textContent = data.message || 'Lỗi không xác định';
                errEl.style.display = 'block';
            }
        }

        // Khởi tạo layer list lần đầu
        renderLayerList();
    </script>
</body>

</html>
