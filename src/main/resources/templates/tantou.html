<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý bản thảo - Tantou</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container p-4 bg-light">
    <h1 class="text-success">Chào mừng Biên tập viên phụ trách (Tantou)</h1>
    <hr>
    <h3>📌 Danh sách dự án mới cần duyệt sơ loại</h3>
    <table class="table table-bordered table-striped bg-white shadow-sm mt-2">
        <thead class="table-dark">
            <tr>
                <th>Mã Đề Xuất</th>
                <th>Tên Bộ Truyện</th>
                <th>Bản Thảo</th>
                <th>Hành Động</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${pendingProposals}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.seriesName}"></td>
                <td>
                    <a th:href="@{/manga/view-file(path=${p.filePath})}" target="_blank" class="btn btn-sm btn-info text-white">👁️ Mở file</a>
                </td>
                <td>
                    <a th:href="@{/manga/tantou/approve(id=${p.id})}" class="btn btn-sm btn-success fw-bold">Duyệt sơ loại</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(pendingProposals)}">
                <td colspan="4" class="text-center text-muted py-3">Không có đề xuất mới.</td>
            </tr>
        </tbody>
    </table>
    <br>
    <a th:href="@{/manga/logout}" class="btn btn-danger">Logout</a>
</body>
</html>
