<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập hệ thống Manga</title>
    <style>
        /* Reset lề cơ bản */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body, html {
            height: 100%;
        }

        /* Định dạng Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: white;
            border-bottom: 1px solid #ddd;
            height: 60px;
        }

        .header .logo {
            font-size: 24px;
            font-weight: bold;
            color: black;
        }

        .header .login-link {
            text-decoration: none;
            color: black;
            font-size: 16px;
        }

        /* Định dạng vùng Background và Nội dung chính */
        .main-background {
            /* Thay link ảnh tại đây bằng đường dẫn ảnh của anh */
            background-image: url('https://images.wallpapersden.com/image/download/monkey-d-luffy-manga_bGlsZ26UmZqaraWkpJRmbmdlrWZlbWU.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: calc(100vh - 60px); /* Trừ đi chiều cao của header */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Định dạng chữ hiển thị */
        .main-title {
            color: red;
            font-size: 60px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8); /* Thêm bóng trắng để dễ đọc trên nền phức tạp */
        }

        .sub-title {
            color: red;
            font-size: 20px;
            margin-bottom: 30px;
            text-shadow: 1px 1px 3px rgba(255, 255, 255, 0.8);
        }

        /* Định dạng Form đăng nhập */
        .login-form {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        /* Định dạng nút submit */
        button[type="submit"] {
            background-color: #ff3333; /* Màu đỏ giống ảnh mẫu */
            color: white;
            border: none;
            padding: 10px 40px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            background-color: #cc0000;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Sankyuu</div>
        <a href="#" class="login-link">Login</a>
    </div>

    <div class="main-background">
        <h1 class="main-title">Manga Paint System</h1>
        <p class="sub-title">One day happy, all life happy</p>
        
        <form class="login-form" action="/auth/login" method="POST">
            <div class="form-group">
                <label for="username">Tài khoản:</label>
                <input type="text" id="username" name="txtUsername" required>
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu:</label>
                <input type="password" id="password" name="txtPassword" required>
            </div>
            <button type="submit">Login</button>
        </form>
    </div>

</body>
</html>
